# --- 基础设置 (General) ---
# 开启最高画质预设 (High-quality profile)
profile=gpu-hq
# 使用下一代视频渲染器 (类似 madVR 的核心)
vo=gpu-next
# 开启硬件解码 (NVIDIA GPU)
hwdec=nvdec
# 启动时开启全屏
# fullscreen=yes

# --- HDR 与 色彩 (HDR & Color) ---
# 自动进行色调映射 (HDR to SDR)
target-colorspace-hint=yes
tone-mapping=bt.2446a
# 更好的缩放算法 (Scaling)
scale=ewa_lanczossharp
dscale=mitchell
cscale=spline36

# --- 渲染器设置 ---
vo=gpu-next
gpu-api=vulkan      # NVIDIA 显卡在 Linux 上用 Vulkan 性能更好
hwdec=nvdec         # 开启硬件解码

# --- 默认启用的着色器 ---
# 我们可以先默认启用色彩优化
glsl-shaders="./shaders/KrigBilateral.glsl"

# --- 画面表现 ---
profile=gpu-hq
deband=yes          # 去色阶断层 (4K 必备)

# 按 ctrl+1 开启/关闭 FSRCNNX (适合看 1080p 视频)
CTRL+1 change-list glsl-shaders toggle "./shaders/FSRCNNX_x2_8-0-4-1.glsl"

# 按 ctrl+2 开启/关闭 KrigBilateral (适合看 4K 视频)
CTRL+2 change-list glsl-shaders toggle "./shaders/KrigBilateral.glsl"

# 按下 p 键在屏幕上显示当前生效的着色器
p show-text "${glsl-shaders}"

# --- 其他 (Others) ---
# 保存退出时的播放位置
save-position-on-quit=yes
# 优先加载中文字幕
slang=chs,sc,zh,chi
# 界面语言
lang=en,zh
